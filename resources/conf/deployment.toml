# WSO2 Micro Integrator 4.3.0 — deployment.toml
# NOTE: Kafka uses the inbound endpoint (class-based polling consumer)
#       and the connector CAR (producer).  Neither requires a
#       [[transport.kafka]] entry here — that section does not exist.

[server]
hostname = "0.0.0.0"
offset = 0

[keystore.tls]
file_name = "repository/resources/security/wso2carbon.jks"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"

[truststore]
file_name = "repository/resources/security/client-truststore.jks"
password = "wso2carbon"

# HTTP transport
[transport.http]
listener.enable = true
listener.port = 8290
sender.enable = true

# HTTPS transport
[transport.https]
listener.enable = true
listener.port = 8253
sender.enable = true

# Management API (REST)
[management_api]
port = 9164
enable_auth = false

# Inbound endpoint thread pool tuning
[mediation]
inbound.core_threads = 20
inbound.max_threads = 100

# Logging
[monitoring]
jmx.enable = false
