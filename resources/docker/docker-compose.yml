networks:
  kafka-mi-net:
    driver: bridge

volumes:
  kafka-data:
  zk-data:
  zk-logs:
  mi-logs:

services:

  # ── ZooKeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: demo-zookeeper
    networks: [kafka-mi-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Kafka Broker ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: demo-kafka
    networks: [kafka-mi-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  # ── Kafka UI (optional but very useful for demos) ─────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: demo-kafka-ui
    networks: [kafka-mi-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: demo-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped

  # ── WSO2 Micro Integrator ─────────────────────────────────────────────────────
  wso2mi:
    build:
      context: ./wso2mi
      dockerfile: ${MI_DOCKERFILE:-Dockerfile}
      args:
        MI_VERSION: ${MI_VERSION:-4.4.0}
    container_name: demo-wso2mi
    networks: [kafka-mi-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8290:8290"   # HTTP passthrough
      - "8253:8253"   # HTTPS passthrough
      - "9164:9164"   # Management API
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
    volumes:
      - mi-logs:/home/wso2carbon/wso2mi-4.4.0/repository/logs
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 8290"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
